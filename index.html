<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABIR SALON BEAUTY</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body{
font-family:'Poppins',sans-serif;
margin:0;
background:#fff;
}

header{
background:linear-gradient(135deg,#ff6b9d,#c44569);
padding:15px;
position:fixed;
width:100%;
top:0;
z-index:1000;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
color:white;
padding:0 20px;
}

nav ul{
display:flex;
gap:20px;
list-style:none;
}

nav a{
color:white;
text-decoration:none;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
background:linear-gradient(#ff6b9d,#c44569);
color:white;
}

.hero h1{
font-size:50px;
}

section{
padding:80px 20px;
text-align:center;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
padding:20px;
background:white;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* BOOKING */
#booking{
background:#f8f8f8;
}

.booking-form{
max-width:450px;
margin:auto;
}

.booking-form input,
.booking-form select,
.booking-form button{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

.booking-form button{
background:linear-gradient(135deg,#ff6b9d,#c44569);
color:white;
border:none;
cursor:pointer;
transition:0.3s;
}

.booking-form button:hover{
transform:scale(1.05);
}

/* CONTACT */
.contact{
background:#c44569;
color:white;
padding:40px;
}
</style>
</head>

<body>

<header>
<nav>
<h2>ABIR SALON</h2>
<ul>
<li><a href="#home">Home</a></li>
<li><a href="#services">Services</a></li>
<li><a href="#booking">Booking</a></li>
<li><a href="#contact">Contact</a></li>
</ul>
</nav>
</header>

<!-- HERO -->
<section id="home" class="hero">
<div>
<h1>ABIR SALON BEAUTY</h1>
<p>Luxury Beauty Salon</p>
<a href="#booking" style="background:white;color:#ff6b9d;padding:10px 20px;border-radius:20px;text-decoration:none;">
Book Now
</a>
</div>
</section>

<!-- SERVICES -->
<section id="services">
<h2>Our Services</h2>
<div class="services">
<div class="card">Makeup</div>
<div class="card">Hair Styling</div>
<div class="card">Nails</div>
<div class="card">Skin Care</div>
</div>
</section>

<!-- BOOKING -->
<section id="booking">
<h2>Book Appointment</h2>

<form class="booking-form"
action="https://formspree.io/f/xykljdyy"
method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<select name="service" required>
<option value="">Choose Service</option>
<option>Makeup</option>
<option>Hair Styling</option>
<option>Nails</option>
<option>Skin Care</option>
</select>

<input type="datetime-local" name="date" required>

<button type="submit">Confirm Booking</button>

</form>
</section>

<!-- CONTACT -->
<section id="contact" class="contact">
<h2>Contact</h2>
<p>📍 Martil</p>
<p>📞 06 99 96 59 29</p>
</section>

</body>
</html>
